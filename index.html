<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nordic Network — Event Photography</title>
  <meta name="description" content="Official photography gallery for Nordic Network football events." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-mark">NN</span>
        <div class="logo-text">
          <span class="logo-title">Nordic Network</span>
          <span class="logo-sub">Event Photography</span>
        </div>
      </div>
      <nav class="header-actions">
        <div class="filter-wrap">
          <label class="filter-label" for="player-filter">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            #
          </label>
          <input
            id="player-filter"
            class="filter-input"
            type="text"
            inputmode="numeric"
            placeholder="Player number…"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="filter-clear" id="filter-clear" aria-label="Clear filter" title="Clear">✕</button>
        </div>
        <span class="photo-count" id="photo-count">— photos</span>
      </nav>
    </div>
  </header>

  <!-- ── HERO ── -->
  <section class="hero" id="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <p class="hero-eyebrow">Official Gallery</p>
      <h1 class="hero-title"><span class="green">N</span>ordic<br><span class="green">N</span>etwork</h1>
      <p class="hero-desc">Capturing every moment of the beautiful game.</p>
    </div>
    <div class="hero-scroll-hint">
      <span>Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- ── ACTIVE FILTER BANNER ── -->
  <div class="active-filter-bar" id="active-filter-bar" hidden>
    <span>Showing photos with player <strong id="active-filter-label">#—</strong></span>
    <button class="clear-btn" id="clear-btn-banner">Clear filter</button>
  </div>

  <!-- ── GALLERY ── -->
  <main class="gallery-section">
    <div class="gallery-grid" id="gallery-grid">
      <!-- Cards injected by script.js -->
    </div>
    <div class="empty-state" id="empty-state" hidden>
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>No photos found for player <strong id="empty-state-number">#–</strong></p>
      <button class="clear-btn" id="clear-btn-empty">Clear filter</button>
    </div>
  </main>

  <!-- ── FOOTER ── -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-brand">Nordic Network</span>
      <span class="footer-copy">All rights reserved.</span>
    </div>
  </footer>

  <!-- ── MODAL ── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-label="Photo viewer" hidden>
    <button class="modal-close" id="modal-close" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>

    <button class="modal-nav modal-prev" id="modal-prev" aria-label="Previous photo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <button class="modal-nav modal-next" id="modal-next" aria-label="Next photo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
    </button>

    <figure class="modal-figure">
      <img class="modal-img" id="modal-img" src="" alt="" />
      <div class="modal-spinner" id="modal-spinner"></div>
    </figure>

    <div class="modal-meta">
      <div class="modal-info">
        <span class="modal-tags" id="modal-tags"></span>
      </div>
      <div class="modal-actions">
        <span class="modal-counter" id="modal-counter"></span>
        <a class="modal-download" id="modal-download" href="#" download aria-label="Download photo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
